<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Appex - Cybersecurity Specialist | Penetration Testing, Digital Forensics, AI-Enhanced Security Operations" />
    <meta name="keywords" content="cybersecurity, penetration testing, ethical hacking, security consultant, vulnerability assessment" />
    <title>APPEX • Cybersecurity Operations</title>
    <style>
      /* Loading animation */
      .loading {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #0a0a0a;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        color: #00ff41;
        font-family: 'Courier New', monospace;
      }
      
      .loading-text {
        font-size: 1.2rem;
        animation: pulse 1.5s infinite;
      }
      
      @keyframes pulse {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div class="loading" id="loading">
      <div class="loading-text">Initializing secure connection...</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Hide loading screen after app loads
      window.addEventListener('load', () => {
        setTimeout(() => {
          document.getElementById('loading').style.display = 'none';
        }, 2000);
      });
    </script>
  </body>
</html>
